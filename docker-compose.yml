version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: microblog
      MYSQL_USER: microblog
      MYSQL_PASSWORD: 5f21da356da74789867fbd7cddee4e8b
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
    networks:
      - microblog-network

  web:
    build: .
    container_name: microblog
    restart: always
    ports:
      - "8080:5000"
    environment:
      - SECRET_KEY=my-secret-key
      - MS_TRANSLATOR_KEY=8mAFzgfqZkIPYJhPnZ6cNYf6Cu4ausMaTDPH4lnmji5IuwvEqFyBJQQJ99CEAC5RqLJXJ3w3AAAbACOGU812
      - DATABASE_URL=mysql+pymysql://microblog:5f21da356da74789867fbd7cddee4e8b@db/microblog
    depends_on:
      - db
    networks:
      - microblog-network

networks:
  microblog-network:
    driver: bridge
