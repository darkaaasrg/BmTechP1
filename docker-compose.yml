version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: microblog
      MYSQL_USER: microblog
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
    networks:
      - microblog-network

  web:
    build: .
    container_name: microblog
    restart: always
    ports:
      - "8080:5000"
    environment:
      - SECRET_KEY=my-secret-key
      - MS_TRANSLATOR_KEY=${MS_TRANSLATOR_KEY}
      - DATABASE_URL=mysql+pymysql://microblog:${MYSQL_PASSWORD}@db/microblog
    depends_on:
      - db
    networks:
      - microblog-network

networks:
  microblog-network:
    driver: bridge
